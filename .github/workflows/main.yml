name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: python -m ruff check .

      - name: Run MyPy type checks
        run: python -m mypy .

      - name: Run Pytest unit tests
        run: python -m pytest

      - name: Verify Docker build
        run: docker build -t official-gazette-etl:ci .

      - name: Docker Compose smoke run (dry-run extractor)
        run: |
          cat <<'EOF' > .env
          OPENAI_API_KEY=dummy
          YRITYSDATA_API_URL=
          YRITYSDATA_API_TOKEN=
          GAZETTE_YEAR=2024
          GAZETTE_NUMBER=001
          EXTRACTOR_DRY_RUN=1
          EOF
          docker compose up --build --abort-on-container-exit
          test -f data/final/konkurssitiedot_staging.xlsx
          test -f data/final/upload_report.json

      - name: Normalize artifact permissions
        if: always()
        run: |
          sudo chown -R "$USER":"$USER" data || true
          chmod -R u+rwX,go+rX data || true
          ls -la data/final || true

      - name: Upload ETL artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etl-final-output
          path: data/final/
          if-no-files-found: warn
